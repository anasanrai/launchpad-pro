<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.2"/>

  <!-- Main Icon: Rocket with upward trajectory -->
  <g filter="url(#shadow)">
    <!-- Rocket Body -->
    <rect x="85" y="50" width="30" height="70" rx="8" fill="url(#logoGradient)" opacity="0.95"/>
    
    <!-- Rocket Nose Cone -->
    <polygon points="100,40 90,50 110,50" fill="url(#accentGradient)"/>
    
    <!-- Rocket Window -->
    <circle cx="100" cy="60" r="6" fill="#ffffff" opacity="0.3"/>
    
    <!-- Left Fin -->
    <polygon points="85,100 70,110 80,105" fill="url(#accentGradient)" opacity="0.8"/>
    
    <!-- Right Fin -->
    <polygon points="115,100 130,110 120,105" fill="url(#accentGradient)" opacity="0.8"/>
    
    <!-- Flame 1 (Inner) -->
    <polygon points="95,120 100,140 105,120" fill="#FF6B35" opacity="0.9"/>
    
    <!-- Flame 2 (Middle) -->
    <polygon points="92,125 100,145 108,125" fill="#FF8C42" opacity="0.7"/>
    
    <!-- Flame 3 (Outer) -->
    <polygon points="88,130 100,150 112,130" fill="#FFA500" opacity="0.5"/>
  </g>

  <!-- Upward Trajectory Arc -->
  <path d="M 140 120 Q 160 80 150 40" 
        stroke="url(#accentGradient)" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"
        stroke-dasharray="5,3"/>

  <!-- Trajectory Dots -->
  <circle cx="150" cy="40" r="3" fill="url(#accentGradient)" opacity="0.8"/>
  <circle cx="155" cy="70" r="2.5" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="158" cy="100" r="2" fill="url(#accentGradient)" opacity="0.4"/>

  <!-- Growth Indicator: Ascending Bars -->
  <g opacity="0.7">
    <rect x="50" y="155" width="8" height="15" fill="url(#logoGradient)" rx="2"/>
    <rect x="62" y="145" width="8" height="25" fill="url(#logoGradient)" rx="2"/>
    <rect x="74" y="135" width="8" height="35" fill="url(#accentGradient)" rx="2"/>
  </g>

  <!-- Outer Ring (Enterprise Sophistication) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#logoGradient)" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#accentGradient)" stroke-width="0.5" opacity="0.2"/>
</svg>
